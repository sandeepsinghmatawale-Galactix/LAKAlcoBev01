<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stockroom Inventory</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script>
        function calculateSale(row) {
            let opening      = parseInt(row.querySelector('.opening').value)  || 0;
            let received     = parseInt(row.querySelector('.received').value) || 0;
            let closingInput = row.querySelector('.closing');
            let closing      = parseInt(closingInput.value)  || 0;
            
            let totalStock = opening + received;

            // HTML5 Validation Constraints
            if (closing < 0) {
                closingInput.setCustomValidity("Closing stock cannot be negative.");
            } else if (closing > totalStock) {
                closingInput.setCustomValidity("Closing stock cannot exceed total stock (" + totalStock + ").");
            } else {
                closingInput.setCustomValidity(""); // Clear standard error
            }

            // Triggers immediate browser visual warning validation bubble
            closingInput.reportValidity();

            // Calculate sale safely (prevents odd negative visual values on screen)
            let sale = totalStock - closing;
            row.querySelector('.sale').value = sale < 0 ? 0 : sale;
        }
    </script>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Stockroom Closing Entry</span>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4">Stockroom Closing Entry</h2>

        <form th:action="@{/stockroom/closing/{sessionId}(sessionId=${sessionId})}"
              method="post">

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                <tr>
                    <th>Brand</th>
                    <th>Size</th>
                    <th>Opening</th>
                    <th>Received</th>
                    <th>Closing</th>
                    <th>Sale</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="stock : ${stocks}">

                    <td>
                        <span th:text="${stock.cachedBrandName}"></span>  <input type="hidden"
                               name="brandSizeId"
                               th:value="${stock.depotBrandSizeId}">      </td>

                    <td>
                        <span th:text="${stock.cachedSizeMl + ' ML'}"></span>  </td>

                    <td>
                        <input type="text"
                               class="form-control opening"
                               th:value="${stock.openingStock}"
                               readonly>
                    </td>

                    <td>
                        <input type="text"
                               class="form-control received"
                               th:value="${stock.receivedStock}"
                               readonly>
                    </td>

                    <td>
                        <input type="number"
                               class="form-control closing"
                               name="closingStock"
                               min="0"
                               th:max="${stock.openingStock + stock.receivedStock}"
                               oninput="calculateSale(this.closest('tr'))"
                               onkeyup="calculateSale(this.closest('tr'))"
                               title="Closing stock must be between 0 and total stock (Opening + Received)"
                               required>
                    </td>

                    <td>
                        <input type="text"
                               class="form-control sale"
                               readonly>
                    </td>

                </tr>
                </tbody>
            </table>

            <button class="btn btn-success w-100" type="submit">
                Submit Stockroom Closing
            </button>

        </form>
    </div>
</div>

</body>
</html>
