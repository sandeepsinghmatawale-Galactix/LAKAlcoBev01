<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Distribution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .remaining-ok  { background-color: #d4edda; }
        .remaining-bad { background-color: #f8d7da; }
        .sticky-header th {
            position: sticky;
            top: 0;
            background: #212529;
            color: white;
            z-index: 10;
        }
    </style>
    <script>
        function validateRow(row) {
            let available = parseInt(row.querySelector('.available').value) || 0;
            let inputs    = row.querySelectorAll('.qty');
            let total     = 0;

            inputs.forEach(input => {
                let val = parseInt(input.value) || 0;
                if (val > available) { input.value = available; val = available; }
                total += val;
            });

            let remaining      = available - total;
            let remainingField = row.querySelector('.remaining');
            remainingField.value = remaining;

            if (remaining === 0) {
                remainingField.classList.add('remaining-ok');
                remainingField.classList.remove('remaining-bad');
                row.classList.remove('table-danger');
            } else if (remaining < 0) {
                remainingField.classList.add('remaining-bad');
                remainingField.classList.remove('remaining-ok');
                row.classList.add('table-danger');
            } else {
                remainingField.classList.remove('remaining-ok', 'remaining-bad');
                row.classList.remove('table-danger');
            }

            validateForm();
        }

        function validateForm() {
            let rows      = document.querySelectorAll("tbody tr");
            let submitBtn = document.getElementById("submitBtn");
            let valid     = true;

            rows.forEach(row => {
                let remaining = parseInt(row.querySelector('.remaining').value) || 0;
                if (remaining !== 0) valid = false;
            });

            submitBtn.disabled = !valid;
            return valid;
        }

        function showToast(message) {
            let toast = document.getElementById("toastMsg");
            toast.innerText = message;
            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 3000);
        }
    </script>
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">Distribution Management</span>
    </div>
</nav>

<div class="container mt-5">

    <div id="toastMsg"
         style="display:none; position:fixed; top:20px; right:20px;
                background:#dc3545; color:white; padding:10px 20px; border-radius:5px;">
    </div>

    <div class="card shadow p-4">

        <h2>Allocate Stock To Wells</h2>

        <div th:if="${error}" class="alert alert-danger mb-3">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/distribution/allocate/{id}(id=${distributionId})}"
              th:object="${wrapper}"
              method="post"
              onsubmit="if(!validateForm()){ showToast('Please fully distribute all stock!'); return false;}">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div style="overflow-x:auto;">
                <table class="table table-bordered">

                    <thead class="table-dark sticky-header">
                    <tr>
                        <th>Brand</th>
                        <th>Size</th>
                        <th>Available</th>
                        <th>Remaining</th>
                        <th th:each="well : ${wells}" th:text="${well.wellName}"></th>
                    </tr>
                    </thead>

                    <tbody>

                    <!-- ✅ PRICING LOOP — replaces old brands/brandSizes loop -->
                    <tr th:each="pricing : ${pricings}"
                        th:if="${stockMap.containsKey(pricing.depotBrandSizeId)}">

                        <!-- BRAND NAME — from cached field -->
                        <td th:text="${pricing.cachedBrandName}"></td>

                        <!-- SIZE — from cached field -->
                        <td th:text="${pricing.cachedSizeMl + ' ML'}"></td>

                        <!-- AVAILABLE -->
                        <td>
                            <input type="text"
                                   class="form-control available"
                                   th:value="${stockMap[pricing.depotBrandSizeId]}"
                                   readonly>
                        </td>

                        <!-- REMAINING -->
                        <td>
                            <input type="text"
                                   class="form-control remaining"
                                   th:value="${stockMap[pricing.depotBrandSizeId]}"
                                   readonly>
                        </td>

                        <!-- WELL COLUMNS -->
                        <td th:each="well : ${wells}"
                            th:with="idx=${indexMap[pricing.depotBrandSizeId + '_' + well.wellId]}">

                            <input type="hidden"
                                   th:field="*{requests[__${idx}__].depotBrandSizeId}"
                                   th:value="${pricing.depotBrandSizeId}"/>

                            <input type="hidden"
                                   th:field="*{requests[__${idx}__].depotBrandId}"
                                   th:value="${pricing.depotBrandId}"/>

                            <input type="hidden"
                                   th:field="*{requests[__${idx}__].wellId}"
                                   th:value="${well.wellId}"/>

                            <input type="number"
                                   class="form-control qty"
                                   th:field="*{requests[__${idx}__].distributedQty}"
                                   min="0"
                                   value="0"
                                   oninput="validateRow(this.closest('tr'))"/>

                        </td>

                    </tr>

                    </tbody>
                </table>
            </div>

            <button id="submitBtn"
                    class="btn btn-warning w-100 mt-3"
                    disabled>
                Submit Distribution
            </button>

        </form>
    </div>
</div>

</body>
</html>
