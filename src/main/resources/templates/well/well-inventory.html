<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Well Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function calculateRow(row) {
            let opening  = parseInt(row.querySelector('.opening').value)  || 0;
            let received = parseInt(row.querySelector('.received').value) || 0;
            let closingInput = row.querySelector('.closing');
            let closing  = parseInt(closingInput.value) || 0;
            let price    = parseFloat(row.querySelector('.price').value)  || 0;

            let totalStock = opening + received;

            // Front-end Validation Logic
            if (closing < 0) {
                closingInput.setCustomValidity("Closing stock cannot be negative.");
            } else if (closing > totalStock) {
                closingInput.setCustomValidity("Closing stock cannot exceed total stock (" + totalStock + ").");
            } else {
                closingInput.setCustomValidity(""); // Reset validation if it passes
            }

            // Triggers the native browser validation tooltip if invalid
            closingInput.reportValidity();

            // Calculate Sale and Amount safely
            let sale     = totalStock - closing;
            let amount   = sale * price;

            // Display results (preventing negative visuals if user inputs an invalid high number)
            row.querySelector('.sale').value   = sale < 0 ? 0 : sale;
            row.querySelector('.amount').value = sale < 0 ? "0.00" : amount.toFixed(2);
        }

        function initRows() {
            document.querySelectorAll("tbody tr").forEach(row => calculateRow(row));
        }

        window.onload = initRows;
    </script>
</head>

<body class="bg-light">
<div class="container mt-4">
    <div class="card p-3 shadow">
        <h3 class="mb-4">Well Closing Entry</h3>

        <form th:action="@{/well/closing/{sessionId}/{wellId}(sessionId=${sessionId}, wellId=${wellId})}"
              method="post">

            <div class="table-responsive">
                <table class="table table-bordered">
                    <thead class="table-dark">
                    <tr>
                        <th>Brand</th>
                        <th>Size</th>
                        <th>Opening</th>
                        <th>Received</th>
                        <th>Closing</th>
                        <th>Sale</th>
                        <th>Price</th>
                        <th>Amount</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="item : ${wellInventory}">

                        <td>
                            <span th:text="${item.productPricing.cachedBrandName}"></span>
                            <input type="hidden"
                                   name="brandSizeId"
                                   th:value="${item.productPricing.depotBrandSizeId}"/>
                        </td>

                        <td>
                            <span th:text="${item.productPricing.cachedSizeMl + ' ML'}"></span>
                        </td>

                        <td>
                            <input class="form-control opening"
                                   th:value="${item.openingStock}"
                                   readonly>
                        </td>

                        <td>
                            <input class="form-control received"
                                   th:value="${item.receivedStock}"
                                   readonly>
                        </td>

                        <td>
                            <input class="form-control closing"
                                   name="closingStock"
                                   type="number"
                                   min="0"
                                   th:max="${item.openingStock + item.receivedStock}"
                                   oninput="calculateRow(this.closest('tr'))"
                                   title="Closing stock cannot be negative or exceed Total Stock"
                                   required>
                        </td>

                        <td>
                            <input class="form-control sale" readonly>
                        </td>

                        <td>
                            <input class="form-control price"
                                   th:value="${item.productPricing.sellingPrice}"
                                   readonly>
                        </td>

                        <td>
                            <input class="form-control amount" readonly>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>

            <button class="btn btn-success w-100 mt-3" type="submit">
                Save & Continue →
            </button>

        </form>
    </div>
</div>
</body>
</html>
